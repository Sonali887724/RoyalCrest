<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile | Royal Crest</title>

    <link rel="stylesheet" href="css/guest-profile.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <a href="guest-dashboard.html" class="back-btn">
        ← Back to Dashboard
    </a>

    <h1 class="page-title">My Profile</h1>

    <div class="profile-card">

        <div class="left">

            <img
                id="profileImage"
                src="/uploads/default-avatar.jpg"
                alt="Profile">

            <br>

            <input
                type="file"
                id="imageInput"
                hidden>

            <label
                for="imageInput"
                class="upload-btn">

                Upload Photo

            </label>

        </div>

        <div class="right">

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    id="name">

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    readonly>

            </div>

            <div class="form-group">

                <label>Phone Number</label>

                <input
                    type="text"
                    id="phone">

            </div>

            <button
                class="save-btn"
                id="saveProfile">

                Save Changes

            </button>

        </div>

    </div>

    <div class="password-card">

        <h2>Change Password</h2>

        <div class="form-group">

            <label>Current Password</label>

            <input
                type="password"
                id="currentPassword">

        </div>

        <div class="form-group">

            <label>New Password</label>

            <input
                type="password"
                id="newPassword">

        </div>

        <div class="form-group">

            <label>Confirm Password</label>

            <input
                type="password"
                id="confirmPassword">

        </div>

        <button
            class="save-btn"
            id="changePassword">

            Change Password

        </button>

    </div>

</div>

<script src="js/guest-profile.js"></script>

</body>
</html>
