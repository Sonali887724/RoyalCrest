<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Guest Dashboard | Royal Crest</title>

    <link rel="stylesheet" href="css/guest-dashboard.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <nav class="navbar">

        <h2>Royal Crest</h2>

        <div>

            <a href="index.html">Home</a>

            <a href="my-bookings.html">My Bookings</a>

            <a href="booking.html">Book Room</a>

            <a href="#" onclick="logoutGuest()">Logout</a>

        </div>

    </nav>

    <section class="dashboard">

        <h1 id="welcomeText">Welcome Guest</h1>

        <div class="cards">

            <div class="card" onclick="location.href='booking.html'">

                <i class="fa-solid fa-bed"></i>

                <h3>Book Room</h3>

            </div>

            <div class="card" onclick="location.href='my-bookings.html'">

                <i class="fa-solid fa-calendar-check"></i>

                <h3>My Bookings</h3>

            </div>

            <div class="card">

                <i class="fa-solid fa-user"></i>

                <h3>Profile</h3>

            </div>

            <div class="card" onclick="logoutGuest()">

                <i class="fa-solid fa-right-from-bracket"></i>

                <h3>Logout</h3>

            </div>

        </div>

    </section>

    <script src="js/guest-dashboard.js"></script>
</body>

</html>
