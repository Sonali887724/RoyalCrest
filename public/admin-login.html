<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Royal Crest Admin Login</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="page">

    <!-- Left Side -->

    <div class="left-panel">

        <div class="overlay">

            <div class="brand">

                <h1>👑 Royal Crest</h1>

                <h2>Luxury Hotel</h2>

                <p>

                    Experience Royalty,<br>

                    Every Stay.

                </p>

            </div>

            <div class="features">

                <div>

                    <i class="fa-solid fa-shield-halved"></i>

                    <span>Secure</span>

                </div>

                <div>

                    <i class="fa-solid fa-users"></i>

                    <span>Trusted</span>

                </div>

                <div>

                    <i class="fa-solid fa-chart-column"></i>

                    <span>Analytics</span>

                </div>

            </div>

        </div>

    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <div class="login-card">

            <i class="fa-solid fa-crown crown"></i>

            <h1>Admin Login</h1>

            <p>

                Sign in to continue

            </p>

            <form id="loginForm">

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                    type="text"
                    id="username"
                    placeholder="Username"
                    required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                </div>

                <button type="submit">

                    Login

                </button>

            </form>

            <div class="login-link">

                New Admin?

                <a href="admin-register.html">

                    Register Here

                </a>

            </div>

        </div>

    </div>

</div>

<script src="js/login.js"></script>

</body>

</html>
